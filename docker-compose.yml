services:
  freebuff2api:
    build: .
    image: freebuff2api:latest
    container_name: freebuff2api
    restart: unless-stopped
    # Bind to host loopback + docker0 bridge gateway:
    #   - 127.0.0.1:28666 → host processes
    #   - 172.17.0.1:28666 → any container (via its default gateway)
    # External internet cannot reach either interface.
    ports:
      - "127.0.0.1:28666:8080"
      - "172.17.0.1:28666:8080"
    # All configuration lives in config.yaml; edit it in place and fsnotify
    # hot-reloads within ~200ms. Live tokens go under ./auths/*.json.
    # token.key (optional): when present enables the admin UI at /admin/.
    # auths/ is mounted read-write so the admin UI can add new credentials.
    command: ["-config", "/app/config.yaml"]
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./auths:/app/auths
      - ./token.key:/app/token.key:ro
    # ── Outbound HTTP proxy (optional) ──
    # Uncomment to route upstream traffic (codebuff + OpenRouter fallback)
    # through a proxy. Only http:// and https:// schemes are supported;
    # socks5 is NOT supported. Values are read at process start — change
    # them and `docker compose restart freebuff2api` to apply.
    #
    # `host.docker.internal` resolves to the host's loopback. Mac / Windows
    # Desktop maps it automatically; on Linux the `extra_hosts` line below
    # is required.
    # environment:
    #   - HTTPS_PROXY=http://host.docker.internal:7890
    #   - HTTP_PROXY=http://host.docker.internal:7890
    #   - NO_PROXY=localhost,127.0.0.1,172.17.0.1
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    networks:
      - freebuff-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  freebuff-net:
    name: freebuff-net
    driver: bridge
